<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brume OPS // TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-layer">
        <div class="terminal-box">
            <div class="line">BRUME_ENGINE_V5.0 // SECURITY_CHECK</div>
            <div class="line">ENTER_ROOT_KEY:</div>
            <input type="password" id="root-key" autofocus placeholder="ACCESS_TOKEN">
            <button onclick="ops.login()">INITIALIZE</button>
            <div id="auth-msg" class="line error"></div>
        </div>
    </div>

    <div id="dashboard-layer" style="display: none;">
        
        <aside>
            <div class="brand">BRUME<span>_OPS</span></div>
            <div class="status">DB_CONNECTION: <span class="green">ACTIVE</span></div>
            
            <nav>
                <button class="active" onclick="ops.tab('overview')">[1] OVERVIEW</button>
                <button onclick="ops.tab('player')">[2] PLAYER_DB</button>
                <button onclick="ops.tab('generator')">[3] NBT_FORGE</button>
            </nav>
            
            <div class="logout" onclick="location.reload()">[X] TERMINATE</div>
        </aside>

        <main>
            <div id="tab-overview" class="panel active">
                <div class="grid-3">
                    <div class="card">
                        <label>TOTAL_USERS</label>
                        <h1 id="stat-users">...</h1>
                    </div>
                    <div class="card">
                        <label>GLOBAL_ECONOMY</label>
                        <h1 id="stat-eco" style="color:#FFD700">...</h1>
                    </div>
                    <div class="card">
                        <label>RICHEST_ENTITY</label>
                        <h3 id="stat-rich">...</h3>
                    </div>
                </div>
            </div>

            <div id="tab-player" class="panel">
                <div class="console-input">
                    <span>QUERY ></span>
                    <input type="text" id="p-search" placeholder="Username or UUID">
                    <button onclick="ops.lookup()">EXECUTE</button>
                </div>

                <div id="p-editor" style="display:none; margin-top:20px;">
                    <div class="card">
                        <div class="line">UUID: <span id="val-uuid" class="dim"></span></div>
                        <div class="line">NAME: <span id="val-name" class="blue"></span></div>
                        <hr>
                        <div class="form-row">
                            <label>COINS:</label>
                            <input type="number" id="inp-coins">
                        </div>
                        <div class="form-row">
                            <label>LEVEL:</label>
                            <input type="number" id="inp-level">
                        </div>
                        <button class="save-btn" onclick="ops.savePlayer()">COMMIT CHANGES >> SQL</button>
                    </div>
                </div>
            </div>

            <div id="tab-generator" class="panel">
                <div class="card">
                    <div class="form-grid">
                        <input type="text" id="gen-id" placeholder="ITEM_ID (e.g. VOID_AXE)">
                        <input type="text" id="gen-name" placeholder="Display Name (e.g. &dVoid Axe)">
                        <select id="gen-tier">
                            <option value="COMMON">COMMON</option>
                            <option value="RARE">RARE</option>
                            <option value="LEGENDARY">LEGENDARY</option>
                            <option value="MYTHIC">MYTHIC</option>
                        </select>
                        <input type="text" id="gen-mat" placeholder="Material (e.g. iron axe)">
                        <input type="number" id="gen-dmg" placeholder="Damage Stat">
                        <input type="number" id="gen-str" placeholder="Strength Stat">
                    </div>
                    <button class="gen-btn" onclick="ops.generate()">COMPILE SKRIPT CODE</button>
                    <textarea id="gen-out" readonly onclick="this.select()"></textarea>
                </div>
            </div>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
